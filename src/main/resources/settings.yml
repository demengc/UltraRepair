# SETTINGS.YML - General settings for the plugin.
# Support: https://demeng.dev/discord
# -----------------------------------------------------------------------------

config-version: 2

# The cooldown added for a player after repairing an item, in seconds.
# Note that cooldowns do NOT persist across server restarts
cooldown:
  # The cooldown for hand repairs.
  hand: 5
  # The cooldown for inventory repairs.
  all: 10

# The sound played when a repair is completed.
sound:
  hand: "BLOCK_ANVIL_USE"
  all: "BLOCK_ANVIL_USE"

# The default, base cost for repairing an item.
# Note that costs are IGNORED if you do not have Vault and an economy plugin installed.
default-cost: 10.00

# The additional cost multiplier for repairing an item, based on its durability.
# The durability GAINED in a repair will be multiplied by this and ADDED to the base cost.
# Example: If repairing 5 durability, and multiplier is 2, $10 will be ADDED to the base cost.
durability-multiplier: 0.00

# Override the default repair cost for specific items.
# Each exception requires "material" and "cost". All other fields are optional conditions.
# Only the conditions you specify are checked: an item matches as long as it meets every listed
# condition, regardless of any other properties it may have.
#
# Supported conditions:
#   material     - (required) The item type. Uses Bukkit material names.
#   cost         - (required) The repair cost to use instead of default-cost.
#   name         - Display name, supports color codes (&b, &c, etc.).
#   lore         - List of lore lines, supports color codes.
#   custom-model-data - Custom model data value (Minecraft 1.14+ only, ignored on older versions).
#   enchants     - Map of enchantment names to required levels. Uses Bukkit enchantment names
#                  (e.g. DURABILITY for Unbreaking, DAMAGE_ALL for Sharpness). The item may have
#                  additional enchantments beyond those listed here.
cost-exceptions:
  # Simple example: all flint and steel items cost $5 to repair.
  flint-and-steel:
    material: "FLINT_AND_STEEL"
    cost: 5.00
  # Advanced example: only a specifically named diamond sword with certain enchantments.
  special-sword:
    material: "DIAMOND_SWORD"
    cost: 50.00
    name: "&bSpecial Sword"
    custom-model-data: 3
    enchants:
      DURABILITY: 1
      DAMAGE_ALL: 3
